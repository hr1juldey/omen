[workspace]
name = "omen"
version = "0.1.0"
description = "JEPA-accelerated path tracing render engine for Mitsuba 3"
authors = ["Omen Contributors"]
channels = [
    "https://conda.modular.com/max-nightly",
    "https://repo.prefix.dev/modular-community",
    "conda-forge",
]
platforms = ["linux-64"]

[dependencies]
python = "3.13.*"
max = ">=26.4.0.dev2026051501,<27"
mojo = ">=1.0.0b2.dev2026051501,<2"
numpy = ">=2.4.4,<3"

[pypi-dependencies]
mitsuba = "==3.8.0"
drjit = "==1.3.1"
pytest = "==9.0.3"
hypothesis = "==6.152.7"
pytest-cov = "==7.1.0"
ruff = "*"

[activation.env]
MODULAR_HOME = "$PIXI_PROJECT_ROOT/.pixi/envs/default/share/max"
MOJO_PIXI_ENV = "$PIXI_PROJECT_ROOT/.pixi/envs/default"
