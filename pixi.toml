[workspace]
name = "omen"
version = "0.1.0"
description = "JEPA-accelerated path tracing render engine for Mitsuba 3"
authors = ["Omen Contributors"]
channels = ["https://prefix.dev/conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.14.*"
# main 
"mitsuba>=3.8.0",
"drjit>=0.5.0",
"pytest>=9.0.3",
"hypothesis>=6.152.7",
"pytest-cov>=7.1.0",
"mojo>=0.26.2.0",
"max>=26.3.0",
"modular>=26.3.0",
"nabla-ml>=26.2251344",

# Development tools
ruff = "*"
pytest = "*"

# Mitsuba 3 installed via: pixi run pip install mitsuba drjit
# (Mitsuba is not in conda-forge, see docs/BPY_MITSUBA_FINDINGS.md)

[activation.env]
MODULAR_HOME = "$PIXI_PROJECT_ROOT/.pixi/envs/default/share/max"
MOJO_PIXI_ENV = "$PIXI_PROJECT_ROOT/.pixi/envs/default"

[workspace]
channels = [
  "https://conda.modular.com/max-nightly",
  "https://repo.prefix.dev/modular-community",
  "conda-forge",
]